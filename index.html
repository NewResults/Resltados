<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descarga tu documento</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── CONFIG ─────────────────────────────────────────────── */
    /* Cambia PDF_URL por la URL directa a tu PDF               */
    /* Cambia PDF_NAME por el nombre con el que se descargará   */
    /* ─────────────────────────────────────────────────────── */

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    rgba(255,255,255,.07);
      --gold:      #c9a84c;
      --gold-dim:  #a8843a;
      --text:      #e8e2d6;
      --muted:     #6e6a62;
      --success:   #4caf82;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── background grain + radial glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 40%, rgba(201,168,76,.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(76,175,130,.06) 0%, transparent 60%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      pointer-events: none; opacity: .6;
    }

    /* ── card ── */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 52px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(201,168,76,.06),
        0 24px 80px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.05);
      animation: rise .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity:0; transform: translateY(32px) scale(.97); }
      to   { opacity:1; transform: translateY(0)   scale(1);    }
    }

    /* corner decorations */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 40px; height: 40px;
      border-color: var(--gold-dim);
      border-style: solid;
      opacity: .35;
    }
    .card::before { top:16px; left:16px;  border-width: 1px 0 0 1px; border-radius: 4px 0 0 0; }
    .card::after  { bottom:16px; right:16px; border-width: 0 1px 1px 0; border-radius: 0 0 4px 0; }

    /* ── icon ── */
    .icon-wrap {
      width: 80px; height: 80px;
      margin: 0 auto 28px;
      background: linear-gradient(145deg, rgba(201,168,76,.15), rgba(201,168,76,.05));
      border: 1px solid rgba(201,168,76,.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .icon-wrap svg { width: 36px; height: 36px; }
    /* pulse ring */
    .icon-wrap::after {
      content: '';
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,.18);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.08); opacity: 0; }
    }

    /* ── typography ── */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -.01em;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: .95rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* ── progress bar ── */
    .progress-wrap {
      background: rgba(255,255,255,.06);
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      width: 0%;
      transition: width .3s ease;
      box-shadow: 0 0 10px rgba(201,168,76,.5);
    }
    .progress-label {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 32px;
      letter-spacing: .04em;
    }

    /* ── status message ── */
    #status {
      font-size: .9rem;
      color: var(--muted);
      min-height: 1.4em;
      transition: color .4s;
    }
    #status.done { color: var(--success); }
    #status.error { color: #e05c5c; }

    /* ── manual button (shown if auto-download fails) ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      padding: 13px 28px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: #0d0f14;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-decoration: none;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 4px 20px rgba(201,168,76,.3);
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.hidden { display: none; }

    /* ── footer ── */
    .footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .03em;
    }
    .footer span { color: rgba(201,168,76,.6); }
  </style>
</head>
<body>

<div class="card">

  <div class="icon-wrap">
    <!-- PDF icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="8" y1="13" x2="16" y2="13"/>
      <line x1="8" y1="17" x2="12" y2="17"/>
    </svg>
  </div>

  <h1>Tu documento está listo</h1>
  <p class="subtitle">La descarga comenzará automáticamente.<br>Esto solo tomará un momento.</p>

  <div class="progress-wrap">
    <div class="progress-bar" id="bar"></div>
  </div>
  <p class="progress-label" id="pct">Preparando descarga…</p>

  <p id="status"></p>

  <a id="manual-btn" class="btn hidden" href="#" download>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Descargar manualmente
  </a>

  <div class="footer">
    Documento seguro &nbsp;<span>·</span>&nbsp; Descarga directa
  </div>
</div>

<script>
  /* ============================================================
     ✏️  CONFIGURACIÓN — edita solo estas dos líneas
     ============================================================ */
  const PDF_URL  = '/RESULTADOS-MAZACON%20GOMEZ%20SIDIA%20ELIZABETH-1201891171-1289821.pdf'; // ← URL de tu PDF
  const PDF_NAME = 'Resultados.pdf';                                // ← nombre del archivo
  /* ============================================================ */

  const bar    = document.getElementById('bar');
  const pct    = document.getElementById('pct');
  const status = document.getElementById('status');
  const btn    = document.getElementById('manual-btn');

  // Animate progress bar (cosmetic — real download is instant via anchor)
  let progress = 0;
  const steps = [
    { target: 30, delay: 0,   label: 'Conectando con el servidor…' },
    { target: 65, delay: 400, label: 'Verificando documento…'      },
    { target: 90, delay: 800, label: 'Iniciando descarga…'         },
    { target: 100,delay: 1200,label: 'Listo.'                      },
  ];

  function animateTo(target, label, cb) {
    const start = progress;
    const dur = 300;
    const t0 = performance.now();
    pct.textContent = label;
    function tick(now) {
      const p = Math.min((now - t0) / dur, 1);
      progress = start + (target - start) * p;
      bar.style.width = progress + '%';
      if (p < 1) requestAnimationFrame(tick);
      else { progress = target; if (cb) cb(); }
    }
    requestAnimationFrame(tick);
  }

  function runSteps(i) {
    if (i >= steps.length) return;
    const s = steps[i];
    setTimeout(() => animateTo(s.target, s.label, () => runSteps(i + 1)), s.delay);
  }
  runSteps(0);

  // Trigger auto-download after 1.4 s (progress done)
  setTimeout(() => {
    try {
      const a = document.createElement('a');
      a.href     = PDF_URL;
      a.download = PDF_NAME;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      status.textContent = '✓ Descarga iniciada correctamente';
      status.className   = 'done';

      // Show manual button as fallback after 2 s
      setTimeout(() => {
        btn.href = PDF_URL;
        btn.download = PDF_NAME;
        btn.classList.remove('hidden');
        btn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          ¿No inició? Haz clic aquí`;
      }, 2000);

    } catch (e) {
      status.textContent = 'No se pudo iniciar la descarga automática.';
      status.className   = 'error';
      btn.href = PDF_URL;
      btn.download = PDF_NAME;
      btn.classList.remove('hidden');
    }
  }, 1450);
</script>

</body>
</html>
